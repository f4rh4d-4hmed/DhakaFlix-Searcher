name: Build & Release DFLIX

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: DFLIX-Windows
          - os: ubuntu-latest
            artifact_name: DFLIX-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cx_Freeze
          pip install -r requirements.txt

      - name: Build executable
        run: python setup.py build

      - name: Zip build output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build\* -DestinationPath DFLIX-Windows.zip

      - name: Zip build output (Linux)
        if: runner.os == 'Linux'
        run: zip -r DFLIX-Linux.zip build/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DFLIX ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/DFLIX-Windows/DFLIX-Windows.zip
            artifacts/DFLIX-Linux/DFLIX-Linux.zip
            
